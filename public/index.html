<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kev-Clip | AI Video Generation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <!-- Config Modal -->
  <div id="configModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full border border-gray-700">
      <h3 class="text-xl font-bold mb-4 flex items-center">
        <svg class="w-6 h-6 mr-2 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span class="i18n-config-title">Configure Your API Keys</span>
      </h3>
      
      <div class="space-y-4 mb-6">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Text Model Provider</label>
          <select id="configTextProvider" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm">
            <option value="openai">OpenAI (GPT-4)</option>
            <option value="deepseek">DeepSeek</option>
            <option value="anthropic">Claude</option>
            <option value="google">Gemini</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Text API Key</label>
          <input type="password" id="configTextKey" placeholder="sk-..." class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm">
        </div>
        
        <div class="border-t border-gray-700 pt-4">
          <label class="block text-sm text-gray-400 mb-1">Video Model Provider</label>
          <select id="configVideoProvider" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm">
            <option value="doubao">Doubao (Seedance)</option>
            <option value="runway">Runway</option>
            <option value="pika">Pika</option>
            <option value="kling">Kling</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Video API Key</label>
          <input type="password" id="configVideoKey" placeholder="Your video API key" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm">
        </div>
      </div>
      
      <div class="flex justify-end space-x-3">
        <button onclick="closeConfig()" class="px-4 py-2 text-gray-400 hover:text-white text-sm">Cancel</button>
        <button onclick="saveConfig()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg text-sm font-medium">Save & Start</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <nav class="glass fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-500 rounded-xl flex items-center justify-center">
          <span class="text-xl font-bold">K</span>
        </div>
        <div>
          <h1 class="text-xl font-bold">Kev-Clip</h1>
          <p class="text-xs text-gray-400">AI Video Studio</p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <!-- Language Switcher -->
        <div class="flex items-center space-x-1 bg-gray-800 rounded-lg p-1">
          <button onclick="setLanguage('en')" id="lang-en" class="px-3 py-1 text-sm rounded-md bg-purple-600 text-white font-medium transition">EN</button>
          <button onclick="setLanguage('zh')" id="lang-zh" class="px-3 py-1 text-sm rounded-md text-gray-400 hover:text-white transition">中文</button>
        </div>
        
        <button onclick="openConfig()" class="text-gray-400 hover:text-white transition flex items-center space-x-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="text-sm i18n-config">Config</span>
        </button>
        <a href="https://github.com/KevPH2026/kev-clip" target="_blank" class="text-gray-400 hover:text-white transition">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </div>
    </div>
  </nav>

  <!-- Demo Banner -->
  <div id="demoBanner" class="hidden bg-yellow-600 text-white text-center py-2 px-4">
    <p class="text-sm">
      🎬 <strong>Demo Mode</strong> — Please configure your API keys to generate videos
      <button onclick="openConfig()" class="underline font-semibold ml-2">Configure Now →</button>
    </p>
  </div>

  <!-- Main Content -->
  <div class="pt-24 pb-12 px-4">
    <div class="max-w-4xl mx-auto">
      
      <!-- Hero -->
      <div class="text-center mb-12">
        <h2 class="text-5xl font-bold mb-4">
          <span class="gradient-text">Watch what you want,</span><br>
          clip it yourself
        </h2>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto">
          Describe your scene, AI generates the video. <br>
          Enter your own API keys to start.
        </p>
      </div>

      <!-- Input Section -->
      <div class="glass rounded-2xl p-6 mb-8">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-2">Describe your scene</label>
          <textarea 
            id="promptInput" 
            placeholder="Cyberpunk girl fighting robots in neon rain..."
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 resize-none"
            rows="3"
          ></textarea>
        </div>
        
        <div class="flex flex-wrap gap-4 mb-4">
          <div class="flex-1 min-w-[150px]">
            <label class="block text-sm text-gray-400 mb-1">Language / 语言</label>
            <select id="languageSelect" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
              <option value="en">English</option>
              <option value="zh">中文</option>
            </select>
          </div>
          <div class="flex-1 min-w-[150px]">
            <label class="block text-sm text-gray-400 mb-1">Script Style / 剧本风格</label>
            <select id="scriptStyleSelect" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
              <option value="short-drama">Short Drama / 短剧</option>
              <option value="anime">Anime / 动漫</option>
              <option value="movie">Movie / 电影感</option>
              <option value="comedy">Comedy / 喜剧</option>
              <option value="horror">Horror / 恐怖</option>
            </select>
          </div>
          <div class="flex-1 min-w-[150px]">
            <label class="block text-sm text-gray-400 mb-1">Visual Style / 视觉风格</label>
            <select id="styleSelect" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
              <option value="cyberpunk">🌃 Cyberpunk / 赛博朋克</option>
              <option value="anime">🎌 Anime / 二次元</option>
              <option value="cinematic">🎬 Cinematic / 电影感</option>
              <option value="fantasy">🐉 Fantasy / 奇幻</option>
              <option value="scifi">🚀 Sci-Fi / 科幻</option>
              <option value="realistic">📷 Realistic / 写实</option>
            </select>
          </div>
          <div class="flex-1 min-w-[150px]">
            <label class="block text-sm text-gray-400 mb-1">Duration / 时长</label>
            <select id="durationSelect" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
              <option value="10">10s</option>
              <option value="30">30s (3 clips)</option>
              <option value="60">60s (6 clips)</option>
            </select>
          </div>
        </div>
        
        <button 
          onclick="generate()" 
          id="generateBtn"
          class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-semibold py-4 rounded-xl transition flex items-center justify-center space-x-2"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span id="generateBtnText">Generate Video</span>
        </button>
      </div>

      <!-- Progress -->
      <div id="progressSection" class="hidden glass rounded-2xl p-6 mb-8">
        <div class="flex items-center justify-between mb-4">
          <span class="text-lg font-semibold">Generating your video...</span>
          <span id="progressPercent" class="text-purple-400">0%</span>
        </div>
        <div class="w-full bg-gray-700 rounded-full h-2 mb-4">
          <div id="progressBar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-2 rounded-full transition-all" style="width: 0%"></div>
        </div>
        <div id="progressStatus" class="text-gray-400 text-sm">Initializing...</div>
      </div>

      <!-- My Videos -->
      <div>
        <h3 class="text-xl font-bold mb-4 flex items-center">
          <svg class="w-5 h-5 mr-2 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
          </svg>
          My Videos
        </h3>
        
        <div id="videosGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Videos will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let ws = null;
    let userConfig = null;

    // Load user config from localStorage
    function loadUserConfig() {
      const saved = localStorage.getItem('kev-clip-config');
      if (saved) {
        userConfig = JSON.parse(saved);
        return true;
      }
      return false;
    }

    // Open config modal
    function openConfig() {
      document.getElementById('configModal').classList.remove('hidden');
      // Load saved values if any
      if (userConfig) {
        document.getElementById('configTextProvider').value = userConfig.textProvider || 'openai';
        document.getElementById('configTextKey').value = userConfig.textKey || '';
        document.getElementById('configVideoProvider').value = userConfig.videoProvider || 'doubao';
        document.getElementById('configVideoKey').value = userConfig.videoKey || '';
      }
    }

    // Close config modal
    function closeConfig() {
      document.getElementById('configModal').classList.add('hidden');
    }

    // Save config
    function saveConfig() {
      const config = {
        textProvider: document.getElementById('configTextProvider').value,
        textKey: document.getElementById('configTextKey').value,
        videoProvider: document.getElementById('configVideoProvider').value,
        videoKey: document.getElementById('configVideoKey').value
      };
      
      if (!config.textKey || !config.videoKey) {
        alert('Please enter both API keys');
        return;
      }
      
      localStorage.setItem('kev-clip-config', JSON.stringify(config));
      userConfig = config;
      closeConfig();
      updateUI();
      alert('✅ API Keys saved! You can now generate videos.');
    }

    // Update UI based on config status
    function updateUI() {
      const hasConfig = !!userConfig;
      const btn = document.getElementById('generateBtn');
      const btnText = document.getElementById('generateBtnText');
      const banner = document.getElementById('demoBanner');
      
      if (hasConfig) {
        btnText.textContent = 'Generate Video';
        btn.classList.remove('opacity-50');
        banner.classList.add('hidden');
      } else {
        btnText.textContent = 'Configure API Keys First';
        btn.classList.add('opacity-50');
        banner.classList.remove('hidden');
      }
    }

    async function loadConfig() {
      // Check if user has local config
      const hasUserConfig = loadUserConfig();
      updateUI();
    }

    async function generate() {
      // Check if user has configured API keys
      if (!userConfig) {
        openConfig();
        return;
      }
      
      const prompt = document.getElementById('promptInput').value;
      const style = document.getElementById('styleSelect').value;
      const duration = document.getElementById('durationSelect').value;
      const language = document.getElementById('languageSelect').value;
      const scriptStyle = document.getElementById('scriptStyleSelect').value;
      
      if (!prompt) {
        alert('Please describe your scene / 请描述你的场景');
        return;
      }
      
      const fullPrompt = `[${style}] ${prompt}`;
      
      // Show progress
      document.getElementById('progressSection').classList.remove('hidden');
      document.getElementById('generateBtn').disabled = true;
      
      try {
        // First, generate script with user config
        updateProgress(10, 'Generating script...');
        
        const scriptRes = await fetch(`${API_BASE}/api/scripts/generate`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Text-Provider': userConfig.textProvider,
            'X-Text-Key': userConfig.textKey
          },
          body: JSON.stringify({
            project_id: 1,
            prompt: fullPrompt,
            title: prompt.slice(0, 50),
            language: language,
            scriptStyle: scriptStyle
          })
        });
        
        if (!scriptRes.ok) {
          throw new Error('Failed to generate script. Check your API keys.');
        }
        
        const script = await scriptRes.json();
        
        // Then, generate video with user config
        updateProgress(30, 'Generating video segments...');
        
        const videoRes = await fetch(`${API_BASE}/api/videos/generate`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Video-Provider': userConfig.videoProvider,
            'X-Video-Key': userConfig.videoKey
          },
          body: JSON.stringify({
            project_id: 1,
            script_id: script.id,
            prompt: fullPrompt,
            duration: parseInt(duration)
          })
        });
        
        if (!videoRes.ok) {
          throw new Error('Failed to generate video. Check your API keys.');
        }
        
        const video = await videoRes.json();
        
        // Poll for completion
        pollVideoStatus(video.id);
        
      } catch (error) {
        console.error('Generation failed:', error);
        updateProgress(0, 'Failed: ' + error.message);
        document.getElementById('generateBtn').disabled = false;
        alert('❌ ' + error.message);
      }
    }

    function updateProgress(percent, status) {
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressPercent').textContent = percent + '%';
      document.getElementById('progressStatus').textContent = status;
    }

    async function pollVideoStatus(videoId) {
      const check = async () => {
        try {
          const res = await fetch(`${API_BASE}/api/videos/1`);
          const videos = await res.json();
          const video = videos.find(v => v.id === videoId);
          
          if (!video) return;
          
          if (video.status === 'completed') {
            updateProgress(100, 'Completed!');
            setTimeout(() => {
              document.getElementById('progressSection').classList.add('hidden');
              document.getElementById('generateBtn').disabled = false;
              loadVideos();
            }, 1000);
          } else if (video.status === 'failed') {
            updateProgress(0, 'Failed: ' + video.error_msg);
            document.getElementById('generateBtn').disabled = false;
          } else {
            updateProgress(50 + Math.random() * 40, 'Generating...');
            setTimeout(check, 2000);
          }
        } catch (e) {
          setTimeout(check, 2000);
        }
      };
      
      check();
    }

    async function loadVideos() {
      try {
        const res = await fetch(`${API_BASE}/api/videos/1`);
        const videos = await res.json();
        
        const grid = document.getElementById('videosGrid');
        
        if (videos.length === 0) {
          grid.innerHTML = `
            <div class="col-span-full text-center py-12 text-gray-500">
              <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
              </svg>
              <p>No videos yet. Create your first one above!</p>
            </div>
          `;
          return;
        }
        
        grid.innerHTML = videos.map(v => `
          <div class="glass rounded-xl overflow-hidden">
            ${v.file_path ? `
              <video src="${v.file_path}" controls class="w-full h-48 object-cover"></video>
            ` : `
              <div class="w-full h-48 bg-gray-800 flex items-center justify-center">
                ${v.status === 'generating' ? '
                  <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 border-2 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-sm">Generating...</span>
                  </div>
                ' : v.status === 'failed' ? '
                  <span class="text-red-400">Failed</span>
                ' : '
                  <span class="text-gray-500">Pending</span>
                '}
              </div>
            `}
            <div class="p-4">
              <p class="text-sm text-gray-300 line-clamp-2">${v.prompt || 'Untitled'}</p>
              <div class="flex justify-between items-center mt-2">
                <span class="text-xs text-gray-500">${v.duration}s · ${new Date(v.created_at).toLocaleDateString()}</span>
                <span class="px-2 py-1 rounded text-xs ${
                  v.status === 'completed' ? 'bg-green-900 text-green-300' :
                  v.status === 'generating' ? 'bg-yellow-900 text-yellow-300' :
                  'bg-red-900 text-red-300'
                }">${v.status}</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load videos');
      }
    }

    // Load initial data
    loadConfig();
    loadVideos();
  </script>
</body>
</html>
